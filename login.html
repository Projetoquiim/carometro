<!DOCTYPE html>

<html lang="pt-BR">
   
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Carômetro | Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

        rel="stylesheet" />

            theme: {
                extend: {
                    "colors": {
                        "surface-dim": "#cbdbf5",

                        "inverse-on-surface": "#eaf1ff",
                        "primary-fixed-dim": "#6bd8cb",
                        "inverse-surface": "#213145",
                        "surface-variant": "#d3e4fe",
                        "surface": "#f8f9ff",
                        "on-secondary": "#ffffff",
                        "inverse-primary": "#6bd8cb",
                        "outline": "#6d7a77",
                        "tertiary-fixed-dim": "#bcc9c6",
                        "surface-container-high": "#dce9ff",
                        "on-secondary-container": "#5c647a",
                        "on-tertiary": "#ffffff",
                        "surface-tint": "#006a61",
                        "surface-bright": "#f8f9ff",
                        "secondary-fixed-dim": "#bec6e0",
                        "secondary": "#565e74",
                        "on-tertiary-fixed": "#121e1c",
                        "on-secondary-fixed": "#131b2e",
                        "primary": "#00685f",
                        "on-secondary-fixed-variant": "#3f465c",
                        "on-error-container": "#93000a",
                        "on-error": "#ffffff",
                        "on-background": "#0b1c30",
                        "primary-container": "#008378",
                        "background": "#f8f9ff",
                        "tertiary-fixed": "#d8e5e2",
                        "surface-container": "#e5eeff",
                        "on-primary-fixed": "#00201d",
                        "error": "#ba1a1a",
                        "on-tertiary-container": "#f3fffc",
                        "on-primary-fixed-variant": "#005049",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-container": "#6b7775",
                        "secondary-container": "#dae2fd",

                        "secondary-fixed": "#dae2fd",

                        "error-container": "#ffdad6",
                        "tertiary": "#525e5c",

                    "borderRadius": {

                    "spacing": {

                        "gutter": "24px",

                    "fontFamily": {

                        "label-sm": ["Manrope"],

    <style>
        body {
            font-family: 'Manrope', sans-serif;
        }

        .glass-effect {
            backdrop-filter: blur(12px);
            background-color: rgba(255, 255, 255, 0.85);
        }
    </style>
</head>

<body class="bg-background min-h-screen flex flex-col items-center justify-between">
    <!-- Background Layer -->
    <div class="fixed inset-0 z-[-1] overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-br from-surface via-surface-container to-surface-dim opacity-70">
        </div>
        <img class="w-full h-full object-cover opacity-20 mix-blend-overlay"
            data-alt="A wide-angle professional corporate office environment with clean lines, glass partitions, and soft architectural lighting. The scene is bright and minimalist with a palette of soft teals and whites, creating a trustworthy and organized atmosphere. High-end professional aesthetic with blurred background focus to maintain clarity for the UI overlay."
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuBLq1oFYdUYTYUHours5Csd2G8wu4lQAP4AvBXREDdm7wQNCDHVYOPyB_GZaJnBKrYCsH5eC-ZScQkPNzA8UngLUPvKwWOHo2EDemRZTxBv1GxGfRPe3m0wHsqRRwCpYKcqaEvUM9r6Y-rM5g_A_jicDQ7-Ir-fKbQk1LDjn0EZ2d6XNMFjehTdyd5O5mBoordj3RcNvxJWnUdPeIUak0D6cvVlUzjpoAkvrc4I9w4CjETwDzyGduklwP7_p0ywJO7XFx6gpBYo6RvA" />
    </div>
    <!-- Main Content Wrapper -->
    <main class="flex-1 flex flex-col items-center justify-center w-full px-margin-mobile md:px-margin-desktop py-xl">
        <!-- Brand Identity -->
        <div class="mb-xl flex flex-col items-center animate-in fade-in slide-in-from-bottom-4 duration-700">
            <div class="bg-primary text-on-primary p-3 rounded-xl shadow-lg mb-sm">
                <span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">face</span>
            </div>
            <h1 class="font-headline-lg text-headline-lg text-primary tracking-tight">Carômetro</h1>
            <p class="font-label-md text-label-md text-on-surface-variant opacity-80 uppercase tracking-widest">Identity
                Systems</p>
        </div>
        <!-- Login Card -->
        <section
            class="w-full max-w-[440px] glass-effect rounded-xl border border-outline-variant shadow-xl p-lg animate-in fade-in zoom-in-95 duration-500">
            <div class="mb-lg">
                <h2 class="font-headline-sm text-headline-sm text-on-surface">Bem-vindo</h2>
                <p class="font-body-sm text-body-sm text-on-surface-variant">Acesse sua conta corporativa para continuar
                </p>
            </div>
            <form class="space-y-sm" onsubmit="return false;">
                <!-- Email Field -->
                <div class="flex flex-col gap-base">
                    <label class="font-label-md text-label-md text-on-surface-variant" for="email">E-mail
                        Corporativo</label>
                    <div class="relative group">
                        <span
                            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">mail</span>
                        <input
                            class="w-full pl-10 pr-4 py-3 rounded-lg border border-outline-variant bg-surface-container-lowest focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all font-body-md text-body-md"
                            id="email" placeholder="nome@empresa.com" type="email" />
                    </div>
                </div>
                <!-- Password Field -->
                <div class="flex flex-col gap-base">
                    <div class="flex justify-between items-end">
                        <label class="font-label-md text-label-md text-on-surface-variant" for="password">Senha</label>
                        <a class="font-label-sm text-label-sm text-primary hover:underline transition-all"
                            href="#">Esqueci minha senha</a>
                    </div>
                    <div class="relative group">
                        <span
                            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
                        <input
                            class="w-full pl-10 pr-10 py-3 rounded-lg border border-outline-variant bg-surface-container-lowest focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all font-body-md text-body-md"
                            id="password" placeholder="••••••••" type="password" />
                        <button
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors"
                            type="button">
                            <span class="material-symbols-outlined text-[20px]">visibility</span>
                        </button>
                    </div>
                </div>
                <!-- Remember Me -->
                <div class="flex items-center gap-xs py-base">
                    <input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary cursor-pointer"
                        id="remember" type="checkbox" />
                    <label class="font-body-sm text-body-sm text-on-surface-variant cursor-pointer select-none"
                        for="remember">Manter conectado</label>
                </div>
                <!-- Primary Action -->
                <button
                    class="w-full bg-primary hover:bg-primary-container text-on-primary font-label-md text-label-md py-3.5 rounded-lg shadow-md hover:shadow-lg transition-all flex items-center justify-center gap-xs active:scale-[0.98]"
                    type="submit">
                    <span class="material-symbols-outlined">login</span>
                    Entrar
                </button>
            </form>
            <!-- Divider -->
            <div class="relative my-lg">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-outline-variant"></div>
                </div>
                <div class="relative flex justify-center text-label-sm">
                    <span
                        class="px-4 bg-transparent text-on-surface-variant bg-surface-container-lowest/50 backdrop-blur-sm rounded-full">Ou
                        entre com</span>
                </div>
            </div>
            <!-- SSO Options -->
            <button
                class="w-full flex items-center justify-center gap-sm bg-surface-container-low hover:bg-surface-variant border border-outline-variant text-on-surface-variant font-label-md text-label-md py-3 rounded-lg transition-all active:scale-[0.98]">
                <svg height="20" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                        fill="#4285F4"></path>
                    <path
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                        fill="#34A853"></path>
                    <path
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                        fill="#FBBC05"></path>
                    <path
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z"
                        fill="#EA4335"></path>
                </svg>
                Google
            </button>
        </section>
        <!-- Help Text -->
        <p class="mt-lg font-body-sm text-body-sm text-on-surface-variant">
            Ainda não tem acesso? <a class="text-primary font-label-md hover:underline" href="#">Solicite ao
                administrador</a>
        </p>
    </main>
    <!-- Footer -->
    <footer
        class="w-full flex flex-col md:flex-row justify-between items-center px-margin-mobile md:px-margin-desktop py-md border-t border-outline-variant bg-surface-dim/30 backdrop-blur-sm z-10">
        <div class="flex flex-col items-center md:items-start mb-base md:mb-0">
            <span class="font-label-md text-label-md font-bold text-on-surface">© 2024 Carômetro System.</span>
            <span class="font-body-sm text-body-sm text-on-surface-variant">All rights reserved.</span>
        </div>
        <div class="flex items-center gap-lg">
            <a class="font-body-sm text-body-sm text-on-surface-variant hover:text-primary transition-colors"
                href="#">Políticas de Privacidade</a>
            <a class="font-body-sm text-body-sm text-on-surface-variant hover:text-primary transition-colors"
                href="#">Termos de Uso</a>
            <a class="font-body-sm text-body-sm text-on-surface-variant hover:text-primary transition-colors"
                href="#">Suporte</a>
        </div>
    </footer>
    <script>
        // Micro-interaction for password visibility
        const togglePassword = () => {
            const passwordInput = document.getElementById('password');
            const toggleBtn = passwordInput.nextElementSibling;
            const icon = toggleBtn.querySelector('.material-symbols-outlined');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.innerText = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                icon.innerText = 'visibility';
            }
        };

        document.querySelector('button[type="button"]').addEventListener('click', togglePassword);

        // Simple form interaction simulation
        document.querySelector('form').addEventListener('submit', (e) => {
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin">progress_activity</span> Validando...`;

            setTimeout(() => {
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }, 1500);
        });
    </script>
</body>

</html>
